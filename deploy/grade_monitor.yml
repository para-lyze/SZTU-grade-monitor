name: Private GPA Monitor

on:
  schedule:
    - cron: "17 8-23 * * *"
      timezone: "Asia/Shanghai"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: private-gpa-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout private repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Query grades and notify
        env:
          STU_ID: ${{ secrets.STU_ID }}
          STU_PWD: ${{ secrets.STU_PWD }}
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
          MAIL_RECEIVER: ${{ secrets.MAIL_RECEIVER }}
          GRADE_STATE_PATH: ${{ github.workspace }}/grade_history.json
          DEBUG_DIR: ${{ runner.temp }}/sztu-grade-monitor-debug
          TZ: Asia/Shanghai
        run: python get_grades.py

      - name: Save private state
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -f grade_history.json
          if git diff --cached --quiet; then
            echo "No state change"
          else
            git commit -m "Update private grade state [skip ci]"
            git push
          fi
